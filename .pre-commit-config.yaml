exclude: |
  (?x)^(
    build/|
    build-esp32s3/|
    managed_components/|
    third_party/|
    src/apps/.*/src/generated/|
    tools/lv_font_pipeline/.*_tmp\.c$
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.3
    hooks:
      - id: clang-format
        name: clang-format (firmware)
        files: ^src/.*\.(c|h|cpp|hpp)$
        args:
          - --style=file
